        .navbar ul {

        }
        .navbar a {
          text-decoration: none;

        /* Two-row layout: first row 4 boxes, second row 3 boxes. Each row 400px tall. */
        .seven-row {
          display: flex;
          flex-wrap: wrap;
          height: 800px; /* 2 rows x 400px */
          overflow: hidden; /* prevent page scroll */
          object-position: center;
            margin: 0 120px 40px 120px;
        }
        /* Rows: no gap between boxes horizontally, keep gap between rows via .seven-row */
        .seven-row .row { display: flex; gap: 0; }
        .seven-row .row-1 .box { flex: 0 0 25%; height: 400px;margin-bottom: 30px; }
        .seven-row .row-2 .box { flex: 0 0 33.3333%; height: 400px; }
        .seven-row .box {
          flex: 0 0 calc((100% - 96px) / 7);
          height: 400px;
          box-sizing: border-box;
          background: linear-gradient(180deg,#ffffff,#f7f7f7);
    
          box-shadow: 0 6px 18px rgba(0,0,0,0.08);
          display:flex;
          align-items:center;
          justify-content:center;
          font-family:'Outfit',sans-serif;
          font-weight:700;
          color:#222;
          overflow: hidden;
        }
        .seven-row .box img { width:100%; height:100%; object-fit:cover; object-position:center; display:block; margin:0; }
        /* Responsive: keep two rows but allow boxes to shrink on small screens */
        @media (max-width:900px) {
          
          .seven-row .row-1 .box { flex: 0 0 calc((100% - 30px) / 4); }
          .seven-row .row-2 .box { flex: 0 0 calc((100% - 20px) / 3); }
        }
